{% extends 'myapp/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-10">
    <div class="custom-card">
      <h2 class="mb-4 fw-bold text-center"><i class="bi bi-search"></i> Search Available Buses</h2>
      <form action="{% url 'findbus' %}" method="post">
        {% csrf_token %}
        <div class="row">
          <div class="col-md-3 mb-3">
            <label class="form-label">From</label>
            <input name="source" type="text" class="form-control" placeholder="Departure city" list="cities" required value="{{ request.POST.source }}">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">To</label>
            <input name="destination" type="text" class="form-control" placeholder="Destination city" list="cities" required value="{{ request.POST.destination }}">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Journey Date</label>
            <input name="date" type="date" class="form-control" required id="journeyDate">
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Sort By</label>
            <select name="sort" class="form-control form-select" style="background:rgba(255,255,255,.12);color:white;border-radius:12px;">
              <option value="time">Departure Time</option>
              <option value="price">Price (Low→High)</option>
              <option value="seats">Most Seats</option>
            </select>
          </div>
        </div>
        <div class="row align-items-center mb-3">
          <div class="col-md-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="round_trip" id="roundTrip">
              <label class="form-check-label" for="roundTrip">Round Trip</label>
            </div>
          </div>
          <div class="col-md-4" id="returnDateDiv" style="display:none;">
            <label class="form-label">Return Date</label>
            <input name="return_date" type="date" class="form-control" id="returnDate">
          </div>
        </div>
        <datalist id="cities">
          {% for city in cities %}<option value="{{ city }}">{% endfor %}
        </datalist>
        <div class="d-grid mt-2">
          <button type="submit" class="btn btn-custom"><i class="bi bi-search"></i> Search Buses</button>
        </div>
        {% if error %}<div class="alert alert-danger mt-3"><i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}</div>{% endif %}
      </form>
    </div>

    {% if fav_routes %}
    <div class="custom-card mt-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-heart-fill text-danger"></i> Favourite Routes</h5>
      <div class="d-flex flex-wrap gap-2">
        {% for fav in fav_routes %}
        <div class="d-flex align-items-center gap-1">
          <a href="?source={{ fav.source }}&destination={{ fav.dest }}&quick=1" class="btn btn-sm btn-outline-info">
            <i class="bi bi-geo-alt"></i> {{ fav.source }} → {{ fav.dest }}
          </a>
          <a href="{% url 'delete_favourite' fav.id %}" class="btn btn-sm btn-outline-danger" title="Remove">
            <i class="bi bi-x"></i>
          </a>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endif %}
  </div>
</div>
<script>
  document.getElementById('journeyDate').min = new Date().toISOString().split('T')[0];
  document.getElementById('roundTrip').addEventListener('change', function(){
    document.getElementById('returnDateDiv').style.display = this.checked ? 'block' : 'none';
  });
</script>
{% endblock %}
